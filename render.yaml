services:
  - type: web
    name: ptsd-il-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/alive
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 1d
      # Render generates a random value once and keeps it stable across deploys
      - key: JWT_SECRET
        generateValue: true
      # Full postgres URL (user + password + host + db) injected from the DB below
      - key: DATABASE_URL
        fromDatabase:
          name: ptsd-il-db
          property: connectionString

databases:
  - name: ptsd-il-db
    plan: free
    postgresMajorVersion: "16"
